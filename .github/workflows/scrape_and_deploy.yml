name: Scrape and Deploy Vahan Dashboard

on:
  schedule:
    # Runs at 00:00 on the 1st of every month
    - cron: '0 0 1 * *'
  # Allows manual triggering from the Actions tab
  workflow_dispatch:
  # Also run when changes are pushed to main
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Scraper Dependencies
        working-directory: ./scraper
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run Scraper
        working-directory: ./scraper
        run: npm start

      - name: Upload Debug Artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: scraper-debug-files
          path: |
            scraper/screenshot.png
            scraper/page.html

      - name: Update Frontend Data
        run: cp ./scraper/vahan_scraped_data.json ./frontend/public/data.json || echo "No new data to copy"

      - name: Commit Scraped Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ./frontend/public/data.json
          git commit -m "Auto-update: Monthly Vahan data [skip ci]" || echo "No changes to commit"
          git push

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
